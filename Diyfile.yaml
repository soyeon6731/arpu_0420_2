# IDCube/Playground 배포용 설정 파일 (필수항목 상단 배치)
version: "1.0"
service_type: "web"
kind: StaticSite
metadata:
  name: arpu-analysis-dashboard
spec:
  # 웹 서비스의 시작점 설정
  index: "index.html"
  # 정적 파일들이 위치한 경로 (현재 루트)
  root: "./"
  # 서비스 포트 (일반적인 웹 포트)
  port: 80
  # 필요한 경우 환경 변수 설정
  env:
    - name: NODE_ENV
      value: "production"
